        <nav>
            <ul>
                <li><a href="origem.html">Origem</a></li>

    <main class="container">
        <h1 style="font-size: 4rem; text-align: center; margin-bottom: 2rem;">Desafio do Cordelista</h1>
        
        <div class="quiz-container">
            <div class="card" style="margin-bottom: 2rem; cursor: default;">
                <h3>Pergunta 1: Por que a literatura de Cordel tem esse nome?</h3>
                <button class="quiz-option" data-correct="false">A) Porque é escrita com cordas.</button>
                <button class="quiz-option" data-correct="true">B) Porque os folhetos eram pendurados em cordéis (barbantes).</button>
                <button class="quiz-option" data-correct="false">C) Porque os poetas usavam roupas de corda.</button>
            </div>

            <div class="card" style="margin-bottom: 2rem; cursor: default;">
                <h3>Pergunta 2: Qual a estrofe mais comum no Cordel?</h3>
                <button class="quiz-option" data-correct="true">A) Sextilha (6 versos).</button>
                <button class="quiz-option" data-correct="false">B) Quadra (4 versos).</button>
                <button class="quiz-option" data-correct="false">C) Décima (10 versos).</button>
            </div>
        </div>

        <div style="text-align: center; margin-top: 3rem;">
            <a href="index.html" class="btn-back-home">Voltar ao Início</a>
        </div>
